<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rocha Advogados — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a7a52;--green-l:#e8f5ef;--green-m:rgba(26,122,82,.18);--green-b:rgba(26,122,82,.8);
  --amber:#b8720e;--amber-l:#fef3e0;--amber-m:rgba(184,114,14,.18);--amber-b:rgba(184,114,14,.8);
  --blue:#1a5fa8;--blue-l:#e5f0fb;
  --purple:#6135a8;--purple-l:#f0eafb;
  --red:#c0392b;--red-l:#fdecea;
  --bg:#f2f4f7;--card:#fff;--border:#e2e6ea;
  --text:#1a1d23;--muted:#6b7280;
  --r:12px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;height:60px;
    position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:8px;background:var(--green);
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:17px;color:#fff;box-shadow:0 2px 8px rgba(26,122,82,.35)}
.brand-info{line-height:1.25}
.brand-name{font-weight:700;font-size:15px}
.brand-name span{color:var(--green)}
.brand-sub{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:500}
#clock{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
main{max-width:1200px;margin:0 auto;padding:24px 20px 56px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);
       padding:18px 20px;border-top:3px solid transparent;transition:transform .15s}
.kcard:hover{transform:translateY(-2px)}
.kcard.k-green{border-color:var(--green)}.kcard.k-amber{border-color:var(--amber)}
.kcard.k-blue{border-color:var(--blue)}.kcard.k-purple{border-color:var(--purple)}
.klabel{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
        font-weight:600;display:flex;align-items:center;gap:5px;margin-bottom:8px}
.kval{font-size:44px;font-weight:700;line-height:1;letter-spacing:-2px;margin-bottom:4px}
.k-green .kval{color:var(--green)}.k-amber .kval{color:var(--amber)}
.k-blue  .kval{color:var(--blue)}.k-purple .kval{color:var(--purple)}
.ksub{font-size:12px;color:var(--muted)}
.chart-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px 24px;margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.07em;
           text-transform:uppercase;display:flex;align-items:center;gap:6px}
.legend{display:flex;gap:16px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:2px}
.chart-wrap{height:180px;position:relative}
.tcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 8px}
.tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
     border-bottom:2px solid transparent;margin-bottom:-1px;
     transition:color .15s,border-color .15s;white-space:nowrap;user-select:none}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:hover:not(.active){color:var(--text)}
.srow{padding:12px 20px;border-bottom:1px solid var(--border)}
.sinput{width:100%;max-width:300px;padding:7px 12px;border-radius:8px;
        border:1px solid var(--border);font-family:inherit;font-size:13px;
        color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.sinput:focus{border-color:var(--green)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 20px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;
         letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border);background:#fafbfc}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f7faf8}
td{padding:12px 20px;font-size:13px;vertical-align:middle}
.td-cliente{font-weight:500}
.td-cpf{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap}
.td-data{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
       border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.b-signed {background:var(--green-l);color:var(--green)}
.b-pending{background:var(--amber-l);color:var(--amber)}
.b-refused{background:var(--red-l);color:var(--red)}
.b-outro  {background:#f0f0f0;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;line-height:1.8}
.loading-wrap{text-align:center;padding:60px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);
         border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pager{display:flex;align-items:center;justify-content:space-between;
       padding:12px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.pager-btns{display:flex;gap:6px}
.pbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);
      font-family:inherit;font-size:12px;cursor:pointer;color:var(--text);transition:background .1s}
.pbtn:hover:not(:disabled){background:var(--bg)}
.pbtn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<nav>
  <div class="brand">
    <div class="logo">R</div>
    <div class="brand-info">
      <div class="brand-name">Rocha <span>Advogados</span></div>
      <div class="brand-sub">Gestão de processos</div>
    </div>
  </div>
  <div id="clock">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span id="clock-txt">Carregando…</span>
  </div>
</nav>
<main>
  <div class="kpis">
    <div class="kcard k-green">
      <div class="klabel">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>Total
      </div>
      <div class="kval" id="k-total">—</div>
      <div class="ksub">envelopes</div>
    </div>
    <div class="kcard k-amber">
      <div class="klabel">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>Em andamento
      </div>
      <div class="kval" id="k-and">—</div>
      <div class="ksub">aguardando assinatura</div>
    </div>
    <div class="kcard k-blue">
      <div class="klabel">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>Hoje
      </div>
      <div class="kval" id="k-hoje">—</div>
      <div class="ksub">assinaturas hoje</div>
    </div>
    <div class="kcard k-purple">
      <div class="klabel">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>Mensal
      </div>
      <div class="kval" id="k-mes">—</div>
      <div class="ksub" id="k-mes-sub">—</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div class="sec-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Envelopes — últimos 14 dias
      </div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--green-b)"></div>Assinados</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--amber-b)"></div>Em andamento</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  </div>

  <div class="tcard">
    <div class="tabs">
      <div class="tab active" data-tab="todos">Todos</div>
      <div class="tab" data-tab="andamento">Em andamento</div>
      <div class="tab" data-tab="hoje">Hoje</div>
      <div class="tab" data-tab="mes">Este mês</div>
    </div>
    <div class="srow">
      <input class="sinput" id="search" type="text" placeholder="Buscar cliente ou CPF…"/>
    </div>
    <div id="table-wrap">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div style="color:var(--muted);font-size:13px">Carregando dados…</div>
      </div>
    </div>
  </div>
</main>
<script>
const API = 'https://script.google.com/macros/s/AKfycbxvERVgKpDlXWaDTeaSme9gJPvSTr4hCqS_eKJtpfR1t2ySdbcuPMh7F3_PIqBsu-w6wg/exec';
const PAGE_SIZE = 25;
const MESES = ['janeiro','fevereiro','março','abril','maio','junho',
               'julho','agosto','setembro','outubro','novembro','dezembro'];
let allRows=[], filtered=[], currentTab='todos', page=0, chart=null;

/* ── PARSE DATA ─────────────────────────────────────────── */
function parseDate(val) {
  if (!val||val===''||val==='undefined'||val==='null') return null;
  const s = String(val).trim();
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d;
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    const d2=new Date(s.replace(' ','T')); return isNaN(d2)?null:d2;
  }
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){const d3=new Date(+m[3],+m[2]-1,+m[1]);return isNaN(d3)?null:d3;}
  return null;
}
function fmtDate(d){
  if(!d)return'—';
  return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function fmtDateTime(d){
  if(!d)return'—';
  return`${fmtDate(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ── HELPERS ─────────────────────────────────────────────── */
function isToday(d){
  if(!d)return false;
  const n=new Date();
  return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
}
function isThisMonth(d){
  if(!d)return false;
  const n=new Date();
  return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
}
function isPending(row){
  const s=(row.status||'').toLowerCase().trim();
  return s==='em andamento'||s==='em curso'||s==='pending'||s==='awaiting';
}
function isSigned(row){
  const s=(row.status||'').toLowerCase().trim();
  return s==='assinado'||s==='signed'||s==='finalizado';
}

/* ── JSONP ───────────────────────────────────────────────── */
function fetchJSONP(url){
  return new Promise((resolve,reject)=>{
    const cbName='__plx_'+Date.now();
    const script=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('Timeout (15s)'));},15000);
    window[cbName]=data=>{cleanup();resolve(data);};
    script.onerror=()=>{cleanup();reject(new Error('Falha ao carregar Apps Script'));};
    script.src=`${url}?callback=${cbName}&t=${Date.now()}`;
    document.head.appendChild(script);
    function cleanup(){clearTimeout(timer);delete window[cbName];script.parentNode?.removeChild(script);}
  });
}

/* ── FETCH ───────────────────────────────────────────────── */
async function fetchRows(){
  const json=await fetchJSONP(API);
  if(!Array.isArray(json))throw new Error('Formato inesperado');
  const rows=json.map(r=>{
    const dataRef=parseDate(r.assinadoEm)||parseDate(r.atualizadoEm)||parseDate(r.criadoEm);
    return{
      status     :(r.status      ||'').trim(),
      cliente    :(r.clienteNome ||'').trim(),
      email      :(r.clienteEmail||'').trim(),
      cpf        :(r.cpf         ||'').trim(),
      data       :dataRef,
      dataAtualiz:parseDate(r.atualizadoEm)||parseDate(r.criadoEm),
    };
  }).filter(r=>r.cliente!==''||r.status!=='');
  console.log('%c[PrimeLex]','color:#1a7a52;font-weight:bold',rows.length,'registros');
  return rows;
}

/* ── KPIs ────────────────────────────────────────────────── */
function updateKPIs(rows){
  const n=new Date();
  const assinados=rows.filter(r=>isSigned(r));
  const hoje=assinados.filter(r=>isToday(r.data)).length;
  const mes =assinados.filter(r=>isThisMonth(r.data)).length;
  const and =rows.filter(r=>isPending(r)).length;
  set('k-total',rows.length.toLocaleString('pt-BR'));
  set('k-and',  and.toLocaleString('pt-BR'));
  set('k-hoje', hoje.toLocaleString('pt-BR'));
  set('k-mes',  mes.toLocaleString('pt-BR'));
  set('k-mes-sub',`${MESES[n.getMonth()]} de ${n.getFullYear()}`);
}
function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}

/* ── GRÁFICO EMPILHADO ───────────────────────────────────── */
function updateChart(rows){
  const labels=[], signed=[], pending=[];
  const hoje=new Date();
  for(let i=13;i>=0;i--){
    const d=new Date(hoje); d.setDate(d.getDate()-i);
    labels.push(`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`);
    const same=r=>{
      const rd=r.data;
      return rd&&rd.getDate()===d.getDate()&&rd.getMonth()===d.getMonth()&&rd.getFullYear()===d.getFullYear();
    };
    signed.push(rows.filter(r=>isSigned(r)&&same(r)).length);
    pending.push(rows.filter(r=>isPending(r)&&same(r)).length);
  }
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          label:'Assinados',data:signed,
          backgroundColor:'rgba(26,122,82,.75)',
          borderColor:'rgba(26,122,82,.9)',
          borderWidth:0,borderRadius:{topLeft:4,topRight:4,bottomLeft:0,bottomRight:0},
          stack:'s',
        },
        {
          label:'Em andamento',data:pending,
          backgroundColor:'rgba(184,114,14,.75)',
          borderColor:'rgba(184,114,14,.9)',
          borderWidth:0,borderRadius:{topLeft:4,topRight:4,bottomLeft:0,bottomRight:0},
          stack:'s',
        }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:c=>`${c.dataset.label}: ${c.parsed.y}`
          }
        }
      },
      scales:{
        x:{grid:{display:false},stacked:true,ticks:{font:{size:11},color:'#9ca3af'}},
        y:{grid:{color:'#f0f0f0'},stacked:true,ticks:{stepSize:1,precision:0,font:{size:11},color:'#9ca3af'},beginAtZero:true}
      }
    }
  });
}

/* ── BADGE ───────────────────────────────────────────────── */
function badge(status){
  const s=(status||'').toLowerCase().trim();
  if(s==='assinado'||s==='signed'||s==='finalizado')
    return`<span class="badge b-signed">✓ Assinado</span>`;
  if(s==='em andamento'||s==='em curso'||s==='pending'||s==='awaiting')
    return`<span class="badge b-pending">● Em andamento</span>`;
  if(s==='recusado'||s==='refused')
    return`<span class="badge b-refused">✕ Recusado</span>`;
  return`<span class="badge b-outro">${status||'—'}</span>`;
}

/* ── TABELA ──────────────────────────────────────────────── */
function applyFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  let base=allRows;
  if(currentTab==='andamento') base=allRows.filter(r=>isPending(r));
  else if(currentTab==='hoje') base=allRows.filter(r=>isSigned(r)&&isToday(r.data));
  else if(currentTab==='mes')  base=allRows.filter(r=>isSigned(r)&&isThisMonth(r.data));
  filtered=q?base.filter(r=>r.cliente.toLowerCase().includes(q)||r.cpf.includes(q)):base;
  page=0;renderTable();
}
function renderTable(){
  const wrap=document.getElementById('table-wrap');
  const start=page*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);
  if(!filtered.length){wrap.innerHTML=`<div class="empty">Nenhum registro encontrado.</div>`;return;}
  const rows=slice.map(r=>`
    <tr>
      <td class="td-cliente">${r.cliente||'—'}</td>
      <td class="td-cpf">${r.cpf||'—'}</td>
      <td class="td-data">${fmtDateTime(r.dataAtualiz)}</td>
      <td>${badge(r.status)}</td>
    </tr>`).join('');
  const total=filtered.length;
  const info=`${start+1}–${Math.min(start+PAGE_SIZE,total)} de ${total.toLocaleString('pt-BR')}`;
  wrap.innerHTML=`
    <table>
      <thead><tr><th>Cliente</th><th>CPF</th><th>Última atualização</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="pager">
      <span>${info}</span>
      <div class="pager-btns">
        <button class="pbtn" id="btn-prev" ${page===0?'disabled':''}>← Anterior</button>
        <button class="pbtn" id="btn-next" ${start+PAGE_SIZE>=total?'disabled':''}>Próximo →</button>
      </div>
    </div>`;
  document.getElementById('btn-prev')?.addEventListener('click',()=>{page--;renderTable();});
  document.getElementById('btn-next')?.addEventListener('click',()=>{page++;renderTable();});
}

/* ── CLOCK + INIT ────────────────────────────────────────── */
function updateClock(){
  const n=new Date();
  set('clock-txt',`Atualizado ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`);
}
async function init(){
  updateClock();
  try{
    allRows=await fetchRows();
    filtered=allRows;
    updateKPIs(allRows);
    updateChart(allRows);
    renderTable();
  }catch(e){
    document.getElementById('table-wrap').innerHTML=`
      <div class="empty" style="color:#c0392b">
        <b>Erro ao carregar dados</b><br><br>${e.message}
      </div>`;
    console.error('[PrimeLex]',e);
  }
}
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    currentTab=t.dataset.tab;
    applyFilter();
  });
});
document.getElementById('search').addEventListener('input',applyFilter);
init();
setInterval(init,5*60*1000);
</script>
</body>
</html>
