<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocha Advogados — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:1rem}
.top{display:flex;align-items:center;justify-content:space-between;padding:.85rem 0 .75rem;border-bottom:1px solid #e5e5e0;margin-bottom:1rem}
.brand{display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;border-radius:10px;background:#0F6E56;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-r{font-size:20px;font-weight:600;color:#fff;font-family:-apple-system,sans-serif}
.logo-name{font-size:18px;font-weight:500;color:#1a1a1a;letter-spacing:-0.5px;line-height:1}
.logo-name span{color:#1D9E75}
.logo-sub{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase}
.refresh-btn{font-size:11px;color:#888;display:flex;align-items:center;gap:5px;cursor:pointer;border:none;background:none;padding:4px 8px;border-radius:6px}
.refresh-btn:hover{background:#eee;color:#333}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
@media(max-width:600px){.grid4{grid-template-columns:repeat(2,1fr)}}
.card{border-radius:12px;padding:1.1rem 1.25rem 1rem;border:1px solid #e5e5e0;background:#fff}
.card-label{font-size:11px;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.card-val{font-size:40px;font-weight:500;line-height:1}
.card-hint{font-size:11px;color:#888;margin-top:5px}
.c-green .card-val{color:#1D9E75}.c-green{border-top:3px solid #1D9E75}
.c-amber .card-val{color:#BA7517}.c-amber{border-top:3px solid #BA7517}
.c-blue .card-val{color:#185FA5}.c-blue{border-top:3px solid #185FA5}
.c-purple .card-val{color:#534AB7}.c-purple{border-top:3px solid #534AB7}
.section{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;margin-bottom:10px}
.sec-head{display:flex;align-items:center;padding:.65rem 1.25rem;background:#fafaf8;border-bottom:1px solid #e5e5e0}
.sec-title{font-size:12px;font-weight:500;color:#888;display:flex;align-items:center;gap:5px}
.tabs{display:flex;gap:2px;padding:.5rem .75rem 0;border-bottom:1px solid #e5e5e0;background:#fafaf8}
.tab{padding:.35rem .75rem;font-size:11px;cursor:pointer;border-radius:4px 4px 0 0;color:#888;border:1px solid transparent;border-bottom:none;margin-bottom:-1px}
.tab.active{background:#fff;color:#1a1a1a;border-color:#e5e5e0;font-weight:500}
.tbl-head{display:grid;grid-template-columns:95px 1fr 140px;padding:.5rem 1.25rem;font-size:10px;color:#888;font-weight:500;border-bottom:1px solid #e5e5e0;background:#fafaf8}
.tbl-row{display:grid;grid-template-columns:95px 1fr 140px;padding:.65rem 1.25rem;font-size:12px;color:#1a1a1a;border-bottom:1px solid #f0f0ee;align-items:center}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:#fafaf8}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-green{background:#E1F5EE;color:#0F6E56}
.b-amber{background:#FAEEDA;color:#854F0B}
.empty{padding:2rem;text-align:center;font-size:12px;color:#888}
</style>
</head>
<body>
<div class="container">

  <div class="top">
    <div class="brand">
      <div class="logo-mark"><span class="logo-r">R</span></div>
      <div>
        <div class="logo-name">Rocha <span>Advogados</span></div>
        <div class="logo-sub">Gestão de processos</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="fetchData()">
      <i class="ti ti-refresh"></i>
      <span id="refreshed">Carregando...</span>
    </button>
  </div>

  <div class="grid4">
    <div class="card c-green">
      <div class="card-label"><i class="ti ti-folders"></i> Total</div>
      <div class="card-val" id="m-total">—</div>
      <div class="card-hint">envelopes</div>
    </div>
    <div class="card c-amber">
      <div class="card-label"><i class="ti ti-clock"></i> Em andamento</div>
      <div class="card-val" id="m-and">—</div>
      <div class="card-hint">aguardando assinatura</div>
    </div>
    <div class="card c-blue">
      <div class="card-label"><i class="ti ti-writing-sign"></i> Hoje</div>
      <div class="card-val" id="m-hoje">—</div>
      <div class="card-hint" id="m-hoje-hint">vs ontem</div>
    </div>
    <div class="card c-purple">
      <div class="card-label"><i class="ti ti-calendar-check"></i> Mensal</div>
      <div class="card-val" id="m-mes">—</div>
      <div class="card-hint" id="m-mes-label">—</div>
    </div>
  </div>

  <div class="section" style="margin-bottom:10px">
    <div class="sec-head">
      <span class="sec-title"><i class="ti ti-chart-bar"></i> Assinaturas — últimos 14 dias</span>
    </div>
    <div style="padding:.75rem 1.25rem">
      <div style="position:relative;height:120px">
        <canvas id="chart" role="img" aria-label="Assinaturas dos últimos 14 dias"></canvas>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="tabs">
      <div class="tab active" id="tab-todos" onclick="setTab('todos')">Todos</div>
      <div class="tab" id="tab-andamento" onclick="setTab('andamento')">Em andamento</div>
      <div class="tab" id="tab-hoje" onclick="setTab('hoje')">Hoje</div>
      <div class="tab" id="tab-mes" onclick="setTab('mes')">Este mês</div>
    </div>
    <div class="tbl-head">
      <span>Data</span><span>Cliente</span><span>Status</span>
    </div>
    <div id="tbody"><div class="empty">Carregando...</div></div>
  </div>

</div>
<script>
const SHEET_ID='1-_hgRb5oVaho7BPDuGtnIhk8gFXgnUO-41Rj4fhbQOQ';
const URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
let allRows=[],tab='todos',ch;
const today=new Date().toISOString().slice(0,10);
const mesStr=today.slice(0,7);
document.getElementById('m-mes-label').textContent=new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

function parseDate(val){
  if(!val)return null;
  if(typeof val==='string'&&val.length>=10)return val.slice(0,10);
  return null;
}
function fmt(d){
  if(!d)return'—';
  const[a,m,dia]=d.split('-');return`${dia}/${m}/${a}`;
}

async function fetchData(){
  document.getElementById('refreshed').textContent='Atualizando...';
  try{
    const res=await fetch(URL+'&t='+Date.now());
    const text=await res.text();
    const json=JSON.parse(text.replace(/^.*?({.*}).*$/s,'$1'));
    const rows=json.table.rows||[];
    allRows=rows.map(r=>{
      const c=r.c||[];
      const g=i=>(c[i]&&c[i].v!=null)?String(c[i].v):'';
      const status=g(1);
      const assinadoEm=parseDate(g(7));
      const criadoEm=parseDate(g(2));
      const isAssinado=status==='Assinado'&&assinadoEm;
      return{status,criadoEm,cliente:g(5)||g(0),assinadoEm:isAssinado?assinadoEm:null};
    }).filter(r=>r.cliente);
    render();
    document.getElementById('refreshed').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('refreshed').textContent='Erro ao carregar';
  }
}

function render(){
  const total=allRows.length;
  const assinados=allRows.filter(r=>r.assinadoEm);
  const andamento=allRows.filter(r=>!r.assinadoEm);
  const hoje=assinados.filter(r=>r.assinadoEm===today).length;
  const mes=assinados.filter(r=>r.assinadoEm&&r.assinadoEm.startsWith(mesStr)).length;

  document.getElementById('m-total').textContent=total;
  document.getElementById('m-and').textContent=andamento.length;
  document.getElementById('m-hoje').textContent=hoje;
  document.getElementById('m-mes').textContent=mes;

  const days14=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days14.push(d.toISOString().slice(0,10));}
  const cnt=Object.fromEntries(days14.map(d=>[d,0]));
  assinados.forEach(r=>{if(r.assinadoEm&&cnt[r.assinadoEm]!==undefined)cnt[r.assinadoEm]++;});
  const labels=days14.map(d=>{const[a,m,dia]=d.split('-');return`${dia}/${m}`;});

  if(ch)ch.destroy();
  ch=new Chart(document.getElementById('chart'),{
    type:'bar',
    data:{labels,datasets:[{data:days14.map(d=>cnt[d]),backgroundColor:'#1D9E75',borderRadius:3,label:'Assinados'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:9},color:'#888',maxRotation:0,autoSkip:false},grid:{display:false},border:{display:false}},
              y:{ticks:{font:{size:9},color:'#888',stepSize:1,precision:0},grid:{color:'rgba(0,0,0,0.06)'},border:{display:false},min:0}}}
  });
  renderTable();
}

function setTab(t){
  tab=t;
  ['todos','andamento','hoje','mes'].forEach(x=>document.getElementById('tab-'+x).className='tab'+(x===t?' active':''));
  renderTable();
}

function renderTable(){
  let data=allRows;
  if(tab==='andamento')data=allRows.filter(r=>!r.assinadoEm);
  else if(tab==='hoje')data=allRows.filter(r=>r.assinadoEm===today||r.criadoEm===today);
  else if(tab==='mes')data=allRows.filter(r=>(r.assinadoEm&&r.assinadoEm.startsWith(mesStr))||(r.criadoEm&&r.criadoEm.startsWith(mesStr)));
  const b=document.getElementById('tbody');
  if(!data.length){b.innerHTML='<div class="empty">Nenhum registro nesta categoria.</div>';return;}
  b.innerHTML=data.map(r=>`
    <div class="tbl-row">
      <span style="font-size:11px;color:#888">${fmt(r.assinadoEm||r.criadoEm)}</span>
      <span style="font-weight:500">${r.cliente}</span>
      <span>${r.assinadoEm
        ?`<span class="badge b-green"><i class="ti ti-check" style="font-size:10px"></i> Assinado ${fmt(r.assinadoEm)}</span>`
        :`<span class="badge b-amber"><i class="ti ti-clock" style="font-size:10px"></i> Em andamento</span>`}
      </span>
    </div>`).join('');
}

fetchData();
setInterval(fetchData,300000);
</script>
</body>
</html>
